<script>
        // Simple accordion logic for receipts
        function toggleReceipt(receiptId, iconId) {
            const receipt = document.getElementById(receiptId);
            const icon = document.getElementById(iconId);
            const parentArticle = receipt.closest('article');
            
            if (receipt.classList.contains('hidden')) {
                receipt.classList.remove('hidden');
                receipt.classList.add('block');
                icon.classList.add('rotate-180');
                
                // Elevate card visually when active
                parentArticle.classList.remove('bg-surface', 'border-outline-variant/50');
                parentArticle.classList.add('bg-surface-container', 'shadow-[0_8px_30px_rgb(0,0,0,0.4)]', 'border-outline-variant');
            } else {
                receipt.classList.remove('block');
                receipt.classList.add('hidden');
                icon.classList.remove('rotate-180');
                
                // Return to flat state
                parentArticle.classList.add('bg-surface', 'border-outline-variant/50');
                parentArticle.classList.remove('bg-surface-container', 'shadow-[0_8px_30px_rgb(0,0,0,0.4)]', 'border-outline-variant');
            }
        }
