<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Live Trip Tracking - LuxeControl</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Playfair+Display:wght@500;600&amp;display=swap" rel="stylesheet"/>

                    "borderRadius": {

                    "spacing": {

                        "gutter": "24px",
                        "unit": "8px",

                        "container-max": "1280px",
                        "margin-desktop": "64px"
                    },
                    "fontFamily": {
                        "headline-sm": ["Playfair Display"],
                        "headline-md": ["Playfair Display"],

<style>
        .glass-panel {
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(233, 193, 118, 0.1);
        }
        .btn-gradient {
            background: linear-gradient(180deg, #e9c176 0%, #dab36a 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background h-screen overflow-hidden flex flex-col relative">
<!-- Top Navigation for Context (Hidden on true mobile app, but kept for structural anchor if needed, otherwise suppressed due to transactional nature of live tracking) -->
<!-- Suppressed TopNavBar as per Semantic Shell Mandate: Linear/Transactional/Task-focused -->
<!-- Main Content Area - Full screen map -->
<main class="flex-1 relative w-full h-full">
<!-- Placeholder for Interactive Dark Map -->
<div class="absolute inset-0 w-full h-full bg-surface-container-lowest" data-location="Manhattan, New York" style="">
<!-- Simulated Map Texture/Image -->
<img alt="Map view" class="w-full h-full object-cover opacity-30 mix-blend-luminosity" data-alt="A highly detailed, stylized dark mode map view of a metropolitan city grid, reminiscent of a premium luxury navigation system. The map features deep slate grays and midnight blacks for buildings and water, with delicate champagne gold lines highlighting major arterial roads. A glowing gold dot indicates the current vehicle position. The overall aesthetic is minimalist, silent luxury, and technically precise, avoiding harsh bright colors or cluttered UI elements." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD1IYkODX9ntNR44YyLhqvKnkwpXU5d08QwONDlmCWp9aER0rfBwk_6KRNaJbZQKYO4I1G2mKt2FJ5Q2XLPBgfRcXpI-kR4b66z1wxfTGsAw1Ps34B5fMHxLRArKQgV9L_OqU5mkQHCambHxSIamzdU7rjwHVhovWbpDAnjJDX8eRk-x4s5v0Gan3DalzpHZOg0xdEB-i_VTfijM5VCvPytyDmK1qN4vgxNUXFPRouMD3S8Tx00R4KSGZZDtPrxaRu3TZKyTg04A5g"/>
<!-- Map Markers -->
<div class="absolute top-[40%] left-[50%] transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
<div class="w-12 h-12 bg-secondary rounded-full flex items-center justify-center shadow-[0_0_24px_rgba(233,193,118,0.4)] animate-pulse">
<span class="material-symbols-outlined text-on-secondary font-bold text-2xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">directions_car</span>
</div>
</div>
<div class="absolute top-[30%] left-[60%] transform -translate-x-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-on-surface-variant text-3xl">location_on</span>
</div>
</div>
<!-- Back Button Overlay -->
<button class="absolute top-margin-mobile left-margin-mobile w-12 h-12 bg-surface-container/80 backdrop-blur-md rounded-full flex items-center justify-center border border-outline-variant hover:border-secondary transition-colors z-10 shadow-lg">
<span class="material-symbols-outlined text-secondary">arrow_back</span>
</button>
<!-- ETA Banner Overlay -->
<div class="absolute top-margin-mobile right-margin-mobile bg-surface-container-highest/90 backdrop-blur-md px-4 py-2 rounded-full border border-outline-variant flex items-center gap-2 z-10 shadow-lg">
<span class="font-headline-sm text-headline-sm text-secondary">14</span>
<span class="font-label-md text-label-md text-on-surface-variant uppercase">min</span>
</div>
<!-- Bottom Status Sheet -->
<div class="absolute bottom-0 left-0 w-full glass-panel rounded-t-[32px] p-margin-mobile flex flex-col gap-unit z-20 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
<!-- Drag Handle -->
<div class="w-12 h-1.5 bg-outline-variant rounded-full mx-auto mb-2"></div>
<!-- Status Header -->
<div class="flex justify-between items-end mb-4">
<div>
<h2 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest mb-1">En Route to pickup</h2>
<p class="font-display-lg-mobile text-display-lg-mobile text-on-surface">Arriving shortly</p>
</div>
<div class="text-right">
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase">Distance</p>
<p class="font-body-lg text-body-lg text-secondary">2.4 mi</p>
</div>
</div>
<!-- Driver & Vehicle Card -->
<div class="bg-surface-container-high rounded-xl p-4 flex items-center justify-between border border-outline-variant/50 mb-4">
<!-- Driver Info -->
<div class="flex items-center gap-4">
<div class="relative w-14 h-14 rounded-full overflow-hidden border-2 border-secondary/30">
<img alt="Driver Photo" class="w-full h-full object-cover" data-alt="A professional headshot of a mature, well-groomed male chauffeur wearing a crisp black suit, white shirt, and black tie. He has a subtle, confident expression. The lighting is dramatic and moody, reflecting a luxury aesthetic with dark slate gray background tones. The overall image exudes trust, professionalism, and high-end service." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCkpAnzXzXU-DY6g6fl392kyKX3mtiF6XVIGQv1za8BbBcCZm4NtSvz9GEVjaTbHzqIsuZXhZIdNPpLOjLswn40bOXsk5Bq6KBiVuXUbdxDY66O5_bKUn5vkqKga-E1TLxs6XsfIdKOVZkb8yRRK9-xBLpIPF9gJ8IXjTlRyxOLp0WjXkRBMmNV44Nse2puJSf5gARJqKu8UVhDxBb5PnWqicK9W8jQao-MICVudjr3iznhMLlW8CE9PuzauhR7RPfYnrzgnAYefUE"/>
<div class="absolute bottom-0 right-0 bg-secondary w-4 h-4 rounded-full border-2 border-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-[10px] text-on-secondary" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
</div>
<div>
<p class="font-body-lg text-body-lg text-on-surface font-medium">Alexander P.</p>
<div class="flex items-center gap-1 text-secondary">
<span class="font-label-sm text-label-sm">4.98</span>
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
</div>
</div>
<!-- Vehicle Info -->
<div class="text-right">
<p class="font-body-md text-body-md text-on-surface font-medium">Mercedes S-Class</p>
<div class="inline-block mt-1 px-2 py-0.5 border border-secondary/50 rounded bg-secondary/10">
<p class="font-label-sm text-label-sm text-secondary uppercase tracking-wider">T 482 YH</p>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex gap-4 w-full">
<button class="flex-1 btn-gradient text-on-secondary font-label-md text-label-md uppercase tracking-wider py-4 rounded-lg flex justify-center items-center gap-2 hover:opacity-90 transition-opacity">
<span class="material-symbols-outlined text-xl">call</span>
                    Contact Chauffeur
                </button>
<button class="w-14 h-14 bg-surface-container border border-outline-variant rounded-lg flex justify-center items-center hover:border-secondary transition-colors text-on-surface-variant hover:text-secondary">
<span class="material-symbols-outlined">more_horiz</span>
</button>
</div>
</div>
</main>
</body></html>
